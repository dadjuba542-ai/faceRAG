face_detection:
  detection_threshold: 0.5
  enable_quality_filter: true
  min_face_size: 60
index:
  embedding_dim: 512
  faiss_index_path: data/faiss.index
  similarity_threshold: 0.35
  top_k_default: 50
photo_root: ""
runtime:
  auto_open_browser: true
  host: 127.0.0.1
  port: 7860
supported_extensions:
- .jpg
- .jpeg
- .png
- .bmp
- .webp
thumbnail:
  crop_size: 160
  jpeg_quality: 80
  save_crop: true
